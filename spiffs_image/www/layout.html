<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AtlasCube – Layout Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .layout-wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 14px;
        }
        .layout-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 16px;
            align-items: start;
        }
        @media (max-width: 800px) {
            .layout-grid { grid-template-columns: 1fr; }
        }
        .canvas-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
        }
        .canvas-card h3 {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
        .lcd-frame {
            background: #000;
            border: 4px solid #2a2a32;
            border-radius: 6px;
            padding: 0;
            display: inline-block;
            box-shadow: 0 0 0 1px #444 inset, 0 6px 24px rgba(0,0,0,.6);
            max-width: 100%;
        }
        svg.lcd { display: block; max-width: 100%; height: auto; }
        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
        }
        .form-section {
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .form-section:last-child { border-bottom: none; }
        .form-section h4 {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 8px;
        }
        .form-row label {
            font-size: 12px;
            color: var(--text);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .form-row input[type="number"] {
            width: 70px;
            padding: 4px 6px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-align: right;
        }
        .form-row select {
            width: 150px;
            padding: 4px 6px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }
        .form-row input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--accent);
        }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: filter .15s;
        }
        .actions button:hover:not(:disabled) { filter: brightness(1.15); }
        .btn-apply { background: var(--accent); color: #001019; }
        .btn-reset { background: var(--bg-panel); color: var(--text); border: 1px solid var(--border) !important; }
        #status_msg {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 8px;
            min-height: 14px;
            text-align: center;
        }
        /* SVG element styles */
        .lcd-bg { fill: #1a1a2e; }
        .panel { fill: rgba(60, 80, 120, 0.35); stroke: #5a7adc; stroke-width: 1; cursor: move; }
        .panel.dragging { fill: rgba(80, 110, 170, 0.55); }
        .label-rect { fill: rgba(140, 160, 220, 0.45); stroke: #8aa0dc; stroke-width: 0.5; cursor: move; }
        .label-rect.dragging { fill: rgba(180, 200, 255, 0.75); }
        .indicator-rect { fill: rgba(220, 100, 100, 0.55); stroke: #e94560; stroke-width: 0.5; pointer-events: none; }
        .corner-handle {
            fill: #f4a738;
            stroke: #1a1a2e;
            stroke-width: 0.5;
        }
        .corner-handle[data-corner="tl"], .corner-handle[data-corner="br"] { cursor: nwse-resize; }
        .corner-handle[data-corner="tr"], .corner-handle[data-corner="bl"] { cursor: nesw-resize; }

        .section-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }
        .section-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }
        .section-tab:hover { color: var(--text); }
        .section-tab.active {
            background: var(--accent);
            color: #001019;
            border-color: var(--accent);
        }
        .indicator-rect.bt-circle {
            fill: rgba(0, 130, 252, 0.4);
            stroke: #0082FC;
            stroke-width: 1;
            pointer-events: auto;
            cursor: move;
        }
        .slider-rect {
            fill: rgba(180, 180, 200, 0.45);
            stroke: #aaa;
            stroke-width: 0.5;
            cursor: move;
        }
        .lcd-text {
            fill: #e8e8ec;
            font-family: 'JetBrains Mono', monospace;
            pointer-events: none;
            user-select: none;
        }
        .field-tag {
            font-size: 6px;
            fill: #aac0ff;
            pointer-events: none;
            user-select: none;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ATLAS <span class="logo-accent">CUBE</span></span>
    </div>
</header>

<main class="layout-wrap">
    <a href="/settings.html" class="back-link">← Back to Settings</a>

    <div class="section-title" style="margin: 16px 0 12px">🖼️ Layout Editor</div>

    <div class="section-tabs">
        <button class="section-tab active" data-section="clock" onclick="selectSection('clock')">🕐 Clock</button>
        <button class="section-tab"        data-section="bt"    onclick="selectSection('bt')">🔵 Bluetooth</button>
    </div>

    <div class="layout-grid">

        <!-- ── SVG canvas ── -->
        <div class="canvas-card">
            <h3>Live preview <span id="screen_dim" style="float:right">—</span></h3>
            <div class="lcd-frame">
                <svg id="lcd" class="lcd" preserveAspectRatio="xMidYMid meet"></svg>
            </div>
            <p style="color:var(--text-dim);font-size:11px;margin-top:8px">
                Drag rectangle body to move. Drag orange corner handles to resize. Labels with only x/y (no size) follow font metrics.
            </p>
        </div>

        <!-- ── Form ── -->
        <div class="form-card">
            <div class="form-section" id="form_section">
                <h4 id="form_section_title">Clock</h4>
                <!-- programmatically populated -->
            </div>

            <div class="actions">
                <button class="btn-reset" onclick="resetProfile()">Reset all</button>
                <button class="btn-apply" id="btn_apply" onclick="applyProfile()">Apply</button>
            </div>
            <div id="status_msg"></div>
        </div>

    </div>
</main>

<script src="layout.js"></script>
</body>
</html>
