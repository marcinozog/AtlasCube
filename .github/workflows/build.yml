name: Build firmware

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [ili9341, st7796, co5300, ssd1322]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone ESP-ADF v2.8
        run: |
          git clone --branch v2.8 --depth 1 \
              https://github.com/espressif/esp-adf.git esp-adf

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          path: '.'
          command: |
            set -euo pipefail
            # build.py is the single entry point shared with local/Windows builds:
            # it selects the variant, patches ESP-ADF/IDF, compresses the web UI,
            # builds, and merges the image. --no-clean: the CI checkout is always fresh.
            python scripts/build.py ${{ matrix.variant }} --adf-path "$PWD/esp-adf" --no-clean
            echo "--- Looking for merged binary ---"
            ls -la "build/AtlasCube-${{ matrix.variant }}.bin"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AtlasCube-${{ matrix.variant }}
          path: build/AtlasCube-${{ matrix.variant }}.bin
          retention-days: 30
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*/AtlasCube-*.bin
