<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AtlasCube · SD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=e0f0c5faaeb0">
<style>
  .transport{display:flex;gap:.5rem;flex-wrap:wrap;margin:.5rem 0}
  .sdbtn{flex:1;min-width:64px;padding:.7rem 1rem;border:none;border-radius:10px;
         background:var(--panel-2,#1c2330);color:var(--text,#e6edf3);
         font:600 1rem/1 'Chakra Petch',sans-serif;cursor:pointer;transition:background .15s}
  .sdbtn:hover{background:var(--accent,#377aff);color:#fff}
  .sdbtn.primary{background:var(--accent,#377aff);color:#fff}
  .sdbtn.on{background:var(--accent,#377aff);color:#fff}
  .np-index{font:500 .85rem 'JetBrains Mono',monospace;color:var(--muted,#8b98a9);margin-top:.25rem}
  #trackList{list-style:none;margin:.5rem 0 0;padding:0;max-height:50vh;overflow:auto}
  #trackList li{padding:.6rem .8rem;border-radius:8px;cursor:pointer;
                font:500 .92rem 'JetBrains Mono',monospace;color:var(--text,#e6edf3);
                display:flex;gap:.6rem;align-items:center}
  #trackList li:hover{background:var(--panel-2,#1c2330)}
  #trackList li.active{background:var(--accent,#377aff);color:#fff}
  #trackList li .num{color:var(--muted,#8b98a9);min-width:1.8rem;text-align:right}
  #trackList li.active .num{color:#dbe6ff}
  .empty{color:var(--muted,#8b98a9);padding:.6rem .2rem;font-size:.9rem}
</style>
</head>
<body>
<header class="app-header">
  <div class="logo"><span class="logo-icon">◈</span>
    <span class="logo-text">ATLAS <span class="logo-accent">CUBE</span></span></div>
  <span class="fw-version">SD MUSIC</span>
</header>

<main class="card">
  <section class="now-playing">
    <div class="np-inner">
      <div id="npTrack" class="track-title">---</div>
      <div id="npIndex" class="np-index">—</div>
      <div id="npInfo"  class="audio-info">---</div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-label">PLAYBACK</div>
    <div class="transport">
      <button class="sdbtn" id="shufBtn" onclick="shuffle()" title="Shuffle">🔀</button>
      <button class="sdbtn" onclick="prev()" title="Previous">⏮</button>
      <button class="sdbtn primary" id="ppBtn" onclick="playPause()" title="Play / Pause">⏯</button>
      <button class="sdbtn" onclick="next()" title="Next">⏭</button>
      <button class="sdbtn" id="repBtn" onclick="repeat()" title="Repeat">🔁</button>
    </div>
    <div class="transport">
      <button class="sdbtn" onclick="stop()" title="Stop">⏹</button>
      <button class="sdbtn primary" style="flex:2" onclick="playAll()">▶ Play folder</button>
      <button class="sdbtn" onclick="scan()">⟳ Scan</button>
    </div>
  </section>

  <section class="panel">
    <div class="slider-row">
      <span class="slider-label">🔊 Volume</span>
      <span id="vol_value" class="slider-value">50</span>
    </div>
    <input type="range" min="0" max="100" value="50"
           id="volume_slider" oninput="onVolumeChange(this.value)" />
  </section>

  <section class="panel">
    <div class="panel-label" id="dirLabel">/sdcard/music</div>
    <ul id="trackList"><li class="empty">Click "Scan"…</li></ul>
  </section>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <a href="/index.html" class="tool-btn tool-link">📻 Radio</a>
    <button class="tool-btn" onclick="openEq()">🎛 Equalizer</button>
    <a href="/bt.html" class="tool-btn tool-link">🔵 Bluetooth</a>
    <a href="/events.html" class="tool-btn tool-link">🗓 Events</a>
    <a href="/settings.html" class="tool-btn tool-link">⚙ Settings</a>
  </div>
</main>

<!-- ═══════════════════════ MODAL: EQUALIZER ═══════════════════════ -->
<div id="eq_modal" class="modal hidden" onclick="onModalBgClick(event,'eq_modal')">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">🎛 Equalizer</span>
      <button class="modal-close" onclick="closeEq()">✕</button>
    </div>
    <canvas id="eq_canvas" width="320" height="120"></canvas>
    <div class="eq-wrapper">
      <div id="eq_bands"></div>
      <div class="eq-scale">
        <span>+6</span>
        <span>0</span>
        <span>−13</span>
      </div>
    </div>
    <div class="eq-footer">
      <button class="btn-secondary" onclick="resetEQ()">↺ Reset</button>
      <button class="btn-secondary" onclick="closeEq()">Close</button>
    </div>
  </div>
</div>

<script src="sd-player.js?v=e0f0c5faaeb0"></script>
</body>
</html>
