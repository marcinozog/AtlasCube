<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AtlasCube – Bluetooth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
    <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ATLAS <span class="logo-accent">CUBE</span></span>
    </div>
</header>

<main class="card">
    <a href="/" class="back-link">← Back to Radio</a>

    <div class="section-title">🔵 Bluetooth</div>

    <!-- ── Status + on/off ── -->
    <section class="panel">
        <div class="panel-label panel-label--row">
            BLUETOOTH
            <span id="bt_status" class="bt-status">⬤ disconnected</span>
        </div>
        <div class="screen-switcher">
            <button class="bt-toggle-btn" id="bt_toggle_btn" onclick="toggleBtMode()">⚪ BT OFF</button>
        </div>

        <!-- BT Now Playing -->
        <div class="now-playing" style="margin-top: 10px;">
            <div class="np-inner">
                <div id="bt_title"  class="station-name">---</div>
                <div id="bt_artist" class="track-title">---</div>
            </div>
            <div id="bt_time" class="audio-info">0:00 / 0:00</div>
        </div>

        <!-- BT Transport -->
        <div class="screen-switcher" style="margin-top: 10px;">
            <button onclick="btCtrl('AT+PV')">⏮</button>
            <button onclick="btCtrl('AT+PA')">▶</button>
            <button onclick="btCtrl('AT+PU')">⏸</button>
            <button onclick="btCtrl('AT+PN')">⏭</button>
        </div>

        <!-- BT Volume -->
        <div class="panel" style="margin-top: 10px;">
            <div class="slider-row">
                <span class="slider-label">📶 BT Volume</span>
                <span id="bt_vol_value" class="slider-value">15</span>
            </div>
            <input type="range" min="0" max="100" value="15"
                   id="bt_volume_slider" oninput="onBtVolumeChange(this.value)" />
        </div>
    </section>

    <!-- ── Console ── -->
    <section class="panel">
        <div class="panel-label panel-label--row">
            CONSOLE
            <button class="bt-toggle-btn" onclick="clearBtLog()">🗑 Clear</button>
        </div>
        <pre id="bt_log" class="bt-log"></pre>
        <div class="bt-send-row">
            <input id="bt_input" class="bt-input" placeholder="AT+STATE" />
            <button class="btn-secondary btn-send" onclick="sendBt()">Send</button>
        </div>
    </section>

</main>

<script src="bt.js"></script>
</body>
</html>
