<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AtlasCube – Playlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="playlist.css">
</head>
<body>

<header class="app-header">
    <div class="logo">
        <span class="logo-icon">◈</span>
        <div class="logo-stack">
            <span class="logo-text">ATLAS <span class="logo-accent">CUBE</span></span>
            <a class="logo-link" href="https://atlascube.net/" target="_blank" rel="noopener">atlascube.net</a>
        </div>
    </div>
</header>

<main class="card card--wide">
    <a href="/" class="back-link">← Back to Radio</a>

    <div class="section-title">📻 Playlist editor</div>

    <div class="panel">
        <div class="pl-hint">Drag ⠿ to reorder. Click ☆ to mark favorite (pinned to top). Max <span id="pl_max">64</span> stations.</div>
        <div id="pl_list" class="pl-list"></div>

        <div class="rb-search">
            <button class="rb-toggle" onclick="rbTogglePanel()">
                <span id="rb_arrow">▸</span> 🔍 Search stations <span class="rb-toggle-dim">(radio-browser.info)</span>
            </button>
            <div id="rb_panel" class="rb-panel" hidden>
                <div class="rb-form">
                    <select id="rb_by" class="field-input rb-by">
                        <option value="name">Name</option>
                        <option value="tag">Tag</option>
                        <option value="country">Country</option>
                    </select>
                    <input id="rb_query" type="text" class="field-input rb-query"
                           placeholder="e.g. jazz, BBC, Poland…" maxlength="64"
                           onkeydown="if (event.key === 'Enter') rbSearch()">
                    <button class="btn-secondary" id="rb_search_btn" onclick="rbSearch()">Search</button>
                </div>
                <div id="rb_results" class="rb-results"></div>
                <div id="rb_status" class="rb-status"></div>
            </div>
        </div>

        <div class="pl-actions">
            <button class="btn-secondary" onclick="plAddRow()">➕ Add station</button>
            <button id="pl_save_btn" onclick="plSave()">💾 Save &amp; Apply</button>
            <button class="pl-download" onclick="document.getElementById('pl_import').click()"
                    title="Replace current list with a CSV file">⬆ Import CSV</button>
            <a class="pl-download" href="/api/playlist.csv" download="playlist.csv"
               title="Download last saved playlist">⬇ Download CSV</a>
            <input id="pl_import" type="file" accept=".csv,text/csv,text/plain"
                   onchange="plImport(this)" hidden>
        </div>
        <div class="pl-meta">
            <span id="pl_count">0</span> / <span id="pl_max2">64</span> stations
        </div>
        <div id="pl_status" class="save-status"></div>
    </div>
</main>

<script src="playlist.js"></script>
</body>
</html>
